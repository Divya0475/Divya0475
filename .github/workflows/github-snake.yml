name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch: {}    # allows manual trigger from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Divya0475
          outputs: |
            dist/github-snake.svg?color_snake=%2322d3ee&color_dots=%230a1f33,%23164e63,%230891b2,%2338bdf8,%2367e8f9
            dist/github-snake-dark.svg?color_snake=%2367e8f9&color_dots=%2304121f,%23164e63,%230891b2,%2322d3ee,%23a5f3fc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push snake output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
