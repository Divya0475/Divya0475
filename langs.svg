<svg width="460" height="200" viewBox="0 0 460 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="langsRounded"><rect width="460" height="200" rx="16"/></clipPath>
  <linearGradient id="langsBg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#071a2c"/>
    <stop offset="100%" stop-color="#04121f"/>
  </linearGradient>
</defs>
<g clip-path="url(#langsRounded)">
  <rect width="460" height="200" fill="url(#langsBg)" stroke="#164e63"/>
  <text x="24" y="34" font-family="Verdana, Arial, sans-serif" font-size="17" font-weight="bold" fill="#e2f6ff">Most Used Languages</text>
  <line x1="24" y1="46" x2="220" y2="46" stroke="#22d3ee" stroke-width="2">
    <animate attributeName="x2" values="24;220" dur="1s" fill="freeze"/>
  </line>

  <g font-family="Verdana, Arial, sans-serif" font-size="13" fill="#cbeff8">
    <text x="24" y="76">Python</text>
    <text x="412" y="76" text-anchor="end" fill="#7dd3fc">48%</text>
    <rect x="24" y="82" width="388" height="9" rx="4.5" fill="#0e3350"/>
    <rect x="24" y="82" height="9" rx="4.5" fill="#22d3ee" width="0">
      <animate attributeName="width" values="0;186" dur="1s" begin="0.3s" fill="freeze"/>
    </rect>

    <text x="24" y="112">TypeScript</text>
    <text x="412" y="112" text-anchor="end" fill="#7dd3fc">21%</text>
    <rect x="24" y="118" width="388" height="9" rx="4.5" fill="#0e3350"/>
    <rect x="24" y="118" height="9" rx="4.5" fill="#38bdf8" width="0">
      <animate attributeName="width" values="0;81" dur="1s" begin="0.5s" fill="freeze"/>
    </rect>

    <text x="24" y="148">JavaScript</text>
    <text x="412" y="148" text-anchor="end" fill="#7dd3fc">14%</text>
    <rect x="24" y="154" width="388" height="9" rx="4.5" fill="#0e3350"/>
    <rect x="24" y="154" height="9" rx="4.5" fill="#0ea5e9" width="0">
      <animate attributeName="width" values="0;54" dur="1s" begin="0.7s" fill="freeze"/>
    </rect>

    <text x="24" y="184">HTML/CSS</text>
    <text x="412" y="184" text-anchor="end" fill="#7dd3fc">10%</text>
    <rect x="24" y="190" width="388" height="9" rx="4.5" fill="#0e3350"/>
    <rect x="24" y="190" height="9" rx="4.5" fill="#0284c7" width="0">
      <animate attributeName="width" values="0;39" dur="1s" begin="0.9s" fill="freeze"/>
    </rect>
  </g>
</g>
</svg>
